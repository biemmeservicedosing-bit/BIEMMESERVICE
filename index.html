
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>BIEMME SERVICE</title>

  <link rel="icon" type="image/jpeg" href="/logo.jpg" />
  <link rel="apple-touch-icon" href="/logo.jpg" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#061f2c" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --dark: #061f2c;
      --dark-2: #0a3245;
      --blue: #0e5a78;
      --cyan: #18c7e8;
      --cyan-soft: #e6faff;
      --bg: #eef4f7;
      --card: #ffffff;
      --text: #101828;
      --muted: #667085;
      --border: #d8e2e8;
      --success-bg: #e9fbe9;
      --success-text: #176b17;
      --danger-bg: #ffecec;
      --danger-text: #9b1111;
      --shadow: 0 18px 45px rgba(6, 31, 44, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, rgba(24,199,232,0.22), transparent 30%),
        linear-gradient(180deg, #f8fcfd 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    .app-header {
      background:
        linear-gradient(135deg, rgba(6,31,44,0.96), rgba(10,50,69,0.96)),
        radial-gradient(circle at 20% 20%, rgba(24,199,232,0.28), transparent 35%);
      color: white;
      padding: 24px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      box-shadow: 0 10px 28px rgba(6,31,44,0.28);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .app-logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.26);
    }

    .header-title {
      font-size: 34px;
      font-weight: 850;
      letter-spacing: 0.5px;
      line-height: 1;
    }

    .header-subtitle {
      margin-top: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #bff4ff;
      letter-spacing: 0.4px;
    }

    .container {
      width: min(920px, calc(100% - 28px));
      margin: 34px auto;
      background: rgba(255,255,255,0.96);
      padding: 32px;
      border-radius: 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.9);
    }

    .login-card {
      max-width: 460px;
      margin-top: 70px;
      padding: 38px;
    }

    h2 {
      margin: 0 0 22px;
      color: var(--dark);
      font-size: 30px;
      letter-spacing: -0.4px;
    }

    h3 {
      margin: 0 0 14px;
      color: var(--dark);
      font-size: 22px;
    }

    h4 {
      margin: 0 0 12px;
      color: var(--dark-2);
      font-size: 18px;
    }

    label {
      display: block;
      margin-top: 17px;
      margin-bottom: 7px;
      font-weight: 750;
      color: var(--dark);
      font-size: 15px;
    }

    input, textarea, select {
      width: 100%;
      padding: 14px 15px;
      border-radius: 15px;
      border: 1px solid var(--border);
      font-size: 16px;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 4px rgba(24,199,232,0.16);
    }

    textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.45;
    }

    button {
      width: 100%;
      padding: 15px 18px;
      border-radius: 16px;
      border: none;
      margin-top: 20px;
      background: linear-gradient(135deg, var(--dark-2), var(--blue));
      color: white;
      font-weight: 850;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(10,50,69,0.22);
      transition: transform .15s, box-shadow .15s, opacity .15s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 32px rgba(10,50,69,0.28);
    }

    button:disabled {
      background: #98a2b3;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .secondary {
      background: #667085;
      box-shadow: none;
    }

    .hidden {
      display: none !important;
    }

    .msg {
      margin-top: 18px;
      padding: 15px;
      border-radius: 14px;
      font-weight: 750;
    }

    .success {
      background: var(--success-bg);
      color: var(--success-text);
    }

    .danger {
      background: var(--danger-bg);
      color: var(--danger-text);
    }

    .top-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 22px;
    }

    .top-actions h2 {
      flex: 1;
      margin-bottom: 0;
    }

    .logout-btn {
      max-width: 150px;
      margin-top: 0;
      background: #667085;
    }

    #risultati_committenti {
      border: 1px solid var(--border);
      border-radius: 15px;
      background: white;
      margin-top: 8px;
      max-height: 230px;
      overflow-y: auto;
      box-shadow: 0 14px 28px rgba(6,31,44,0.10);
    }

    .risultato-committente {
      padding: 13px 15px;
      border-bottom: 1px solid #eef2f4;
      cursor: pointer;
      font-weight: 650;
    }

    .risultato-committente:hover {
      background: var(--cyan-soft);
      color: var(--dark);
    }

    .ore-section, .firma-section {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid #dbe4ea;
    }

    .plus-btn {
      font-size: 34px;
      height: 70px;
      border-radius: 18px;
    }

    .ore-card, .firma-box {
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      margin-top: 16px;
      background: linear-gradient(180deg, #fff, #f8fbfc);
    }

    .ore-card p {
      margin: 8px 0;
      color: var(--muted);
    }

    canvas {
      width: 100%;
      height: 180px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: white;
      touch-action: none;
      display: block;
      margin-top: 10px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(6,31,44,0.58);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 99;
    }

    .modal.hidden {
      display: none;
    }

    .modal-box {
      background: white;
      width: 100%;
      max-width: 650px;
      border-radius: 26px;
      padding: 26px;
      max-height: 90vh;
      overflow: auto;
      box-shadow: var(--shadow);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 720px) {
      .app-header {
        justify-content: flex-start;
        padding: 18px;
      }

      .app-logo {
        width: 58px;
        height: 58px;
      }

      .header-title {
        font-size: 24px;
      }

      .header-subtitle {
        font-size: 12px;
      }

      .container {
        width: calc(100% - 20px);
        padding: 22px;
        margin: 18px auto;
        border-radius: 22px;
      }

      .login-card {
        margin-top: 28px;
      }

      .row {
        grid-template-columns: 1fr;
      }

      .top-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .logout-btn {
        max-width: none;
      }
    }
  </style>
</head>

<body>

<header class="app-header">
  <img src="logo.jpg" class="app-logo" alt="BIEMME Engineering" />
  <div>
    <div class="header-title">BIEMME SERVICE</div>
    <div class="header-subtitle">Rapporti di assistenza tecnica</div>
  </div>
</header>

<div class="container login-card" id="loginBox">
  <h2>Accesso tecnico</h2>

  <label>Email</label>
  <input type="email" id="email" autocomplete="email" />

  <label>Password</label>
  <input type="password" id="password" autocomplete="current-password" />

  <button onclick="login()">Accedi</button>

  <div id="loginMsg" class="msg hidden"></div>
</div>

<div class="container hidden" id="appBox">
  <div class="top-actions">
    <h2>Nuovo rapportino</h2>
    <button class="logout-btn" onclick="logout()">Esci</button>
  </div>

  <label>Data intervento</label>
  <input type="date" id="data_intervento" />

  <label>Numero SO</label>
  <input type="text" id="numero_so" placeholder="Facoltativo" />

  <label>Committente</label>
  <input type="text" id="committente_search" placeholder="Scrivi per cercare il committente..." oninput="cercaCommittente()" autocomplete="off" />
  <input type="hidden" id="committente_id" />
  <div id="risultati_committenti" class="hidden"></div>

  <label>Cliente</label>
  <input type="text" id="descrizione_cliente" placeholder="Nome cliente / hotel / stabilimento" />

  <label>Indirizzo cliente</label>
  <input type="text" id="indirizzo_cliente" placeholder="Indirizzo intervento" />

  <label>Relazione intervento</label>
  <textarea id="relazione"></textarea>

  <div class="ore-section">
    <h3>Ore</h3>
    <button class="plus-btn" onclick="apriOre()">+</button>

    <div class="ore-card">
      <p><strong>Totali</strong></p>
      <p>Numero di righe: <span id="numero_righe_ore">0</span></p>
      <div id="riepilogo_ore"></div>
    </div>
  </div>

  <label>Km percorsi</label>
  <input type="number" id="km_percorsi" placeholder="0" />

  <label>Materiali utilizzati</label>
  <textarea id="materiali_note"></textarea>

  <label>Tipo addebito</label>
  <select id="tipo_addebito">
    <option value="">Seleziona</option>
    <option value="cliente">In conto cliente</option>
    <option value="committente">In conto committente</option>
    <option value="garanzia">Garanzia</option>
  </select>

  <div class="firma-section">
    <h3>Firme</h3>

    <div class="firma-box">
      <h4>Firma tecnico</h4>
      <label>Nome tecnico</label>
      <input type="text" id="nome_tecnico" placeholder="Nome e cognome tecnico" />
      <canvas id="firma_tecnico"></canvas>
      <button class="secondary" onclick="pulisciFirma('firma_tecnico')">Cancella firma tecnico</button>
    </div>

    <div class="firma-box">
      <h4>Firma cliente</h4>
      <label>Nome cliente firmatario</label>
      <input type="text" id="nome_cliente_firma" placeholder="Nome e cognome cliente" />
      <canvas id="firma_cliente"></canvas>
      <button class="secondary" onclick="pulisciFirma('firma_cliente')">Cancella firma cliente</button>
    </div>
  </div>

  <button id="btnSalva" onclick="salvaRapportino()">Salva rapportino e archivia PDF</button>
  <div id="appMsg" class="msg hidden"></div>
</div>

<div class="modal hidden" id="modalOre">
  <div class="modal-box">
    <h2>Aggiungi ore</h2>

    <label>Tipologia ore</label>
    <select id="modal_tipo_ore">
      <option value="trasferta">Ore trasferta</option>
      <option value="lavoro">Ore lavorate</option>
    </select>

    <h3>Intervallo 1</h3>

    <label>Da</label>
    <div class="row">
      <input type="date" id="modal_data_inizio_1" />
      <select id="modal_ora_inizio_1"></select>
    </div>

    <label>A</label>
    <div class="row">
      <input type="date" id="modal_data_fine_1" />
      <select id="modal_ora_fine_1"></select>
    </div>

    <h3>Intervallo 2</h3>

    <label>Da</label>
    <div class="row">
      <input type="date" id="modal_data_inizio_2" />
      <select id="modal_ora_inizio_2"></select>
    </div>

    <label>A</label>
    <div class="row">
      <input type="date" id="modal_data_fine_2" />
      <select id="modal_ora_fine_2"></select>
    </div>

    <button onclick="confermaOre()">Conferma</button>
    <button class="secondary" onclick="chiudiOre()">Annulla</button>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://ehrmyyjojlgrdgxjsuzu.supabase.co";
  const SUPABASE_KEY = "sb_publishable_5GARNlBShnQXlLnQy-kCnA_JhlcIcr3";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let listaCommittenti = [];
  let oreInserite = [];

  const firmeDisegnate = {
    firma_tecnico: false,
    firma_cliente: false
  };

  document.addEventListener("DOMContentLoaded", async () => {
    const oggi = new Date().toISOString().split("T")[0];
    document.getElementById("data_intervento").value = oggi;

    creaMenuOre();
    preparaCanvasFirma("firma_tecnico");
    preparaCanvasFirma("firma_cliente");

    const { data } = await supabaseClient.auth.getSession();
    if (data.session) mostraApp();
  });

  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
      mostraMessaggio("loginMsg", error.message, "danger");
      return;
    }

    mostraApp();
  }

  async function logout() {
    await supabaseClient.auth.signOut();
    window.location.reload();
  }

  async function mostraApp() {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("appBox").classList.remove("hidden");

    setTimeout(() => {
      ridimensionaCanvas("firma_tecnico");
      ridimensionaCanvas("firma_cliente");
    }, 200);

    await caricaCommittenti();
  }

  async function caricaCommittenti() {
    const { data, error } = await supabaseClient
      .from("committenti")
      .select("id, ragione_sociale")
      .eq("attivo", true)
      .order("ragione_sociale", { ascending: true });

    if (error) {
      mostraMessaggio("appMsg", "Errore caricamento committenti: " + error.message, "danger");
      return;
    }

    listaCommittenti = data || [];
  }

  function cercaCommittente() {
    const testo = document.getElementById("committente_search").value.toLowerCase();
    const box = document.getElementById("risultati_committenti");

    document.getElementById("committente_id").value = "";

    if (testo.length < 2) {
      box.classList.add("hidden");
      box.innerHTML = "";
      return;
    }

    const filtrati = listaCommittenti.filter(c =>
      c.ragione_sociale.toLowerCase().includes(testo)
    );

    box.innerHTML = "";

    filtrati.forEach(c => {
      const div = document.createElement("div");
      div.className = "risultato-committente";
      div.textContent = c.ragione_sociale;
      div.onclick = () => selezionaCommittente(c);
      box.appendChild(div);
    });

    if (filtrati.length === 0) {
      const div = document.createElement("div");
      div.className = "risultato-committente";
      div.textContent = "Nessun committente trovato";
      box.appendChild(div);
    }

    box.classList.remove("hidden");
  }

  function selezionaCommittente(committente) {
    document.getElementById("committente_search").value = committente.ragione_sociale;
    document.getElementById("committente_id").value = committente.id;
    document.getElementById("risultati_committenti").classList.add("hidden");
  }

  function creaMenuOre() {
    const ids = [
      "modal_ora_inizio_1",
      "modal_ora_fine_1",
      "modal_ora_inizio_2",
      "modal_ora_fine_2"
    ];

    ids.forEach(id => {
      const select = document.getElementById(id);
      select.innerHTML = '<option value="">Ora</option>';

      for (let h = 0; h < 24; h++) {
        for (let m of [0, 15, 30, 45]) {
          const hh = String(h).padStart(2, "0");
          const mm = String(m).padStart(2, "0");
          const value = `${hh}:${mm}`;

          const option = document.createElement("option");
          option.value = value;
          option.textContent = value;
          select.appendChild(option);
        }
      }
    });
  }

  function apriOre() {
    const data = document.getElementById("data_intervento").value || new Date().toISOString().split("T")[0];

    document.getElementById("modal_data_inizio_1").value = data;
    document.getElementById("modal_data_fine_1").value = data;
    document.getElementById("modal_data_inizio_2").value = data;
    document.getElementById("modal_data_fine_2").value = data;

    document.getElementById("modal_ora_inizio_1").value = "";
    document.getElementById("modal_ora_fine_1").value = "";
    document.getElementById("modal_ora_inizio_2").value = "";
    document.getElementById("modal_ora_fine_2").value = "";

    document.getElementById("modalOre").classList.remove("hidden");
  }

  function chiudiOre() {
    document.getElementById("modalOre").classList.add("hidden");
  }

  function confermaOre() {
    const tipo = document.getElementById("modal_tipo_ore").value;

    aggiungiIntervallo(tipo, "modal_data_inizio_1", "modal_ora_inizio_1", "modal_data_fine_1", "modal_ora_fine_1");
    aggiungiIntervallo(tipo, "modal_data_inizio_2", "modal_ora_inizio_2", "modal_data_fine_2", "modal_ora_fine_2");

    aggiornaRiepilogoOre();
    chiudiOre();
  }

  function aggiungiIntervallo(tipo, dataInizioId, oraInizioId, dataFineId, oraFineId) {
    const dataInizio = document.getElementById(dataInizioId).value;
    const oraInizio = document.getElementById(oraInizioId).value;
    const dataFine = document.getElementById(dataFineId).value;
    const oraFine = document.getElementById(oraFineId).value;

    if (dataInizio && oraInizio && dataFine && oraFine) {
      oreInserite.push({
        tipo: tipo,
        ora_inizio: `${dataInizio}T${oraInizio}:00`,
        ora_fine: `${dataFine}T${oraFine}:00`
      });
    }
  }

  function aggiornaRiepilogoOre() {
    document.getElementById("numero_righe_ore").textContent = oreInserite.length;

    const box = document.getElementById("riepilogo_ore");
    box.innerHTML = "";

    oreInserite.forEach((o, index) => {
      const nome = o.tipo === "trasferta" ? "Ore trasferta" : "Ore lavorate";
      const p = document.createElement("p");
      p.innerHTML = `<strong>${index + 1}. ${nome}</strong><br>${formattaDataOra(o.ora_inizio)} → ${formattaDataOra(o.ora_fine)}`;
      box.appendChild(p);
    });
  }

  function formattaDataOra(valore) {
    const d = new Date(valore);
    return d.toLocaleString("it-IT", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  function preparaCanvasFirma(canvasId) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext("2d");
    let drawing = false;

    ridimensionaCanvas(canvasId);

    function posizione(evento) {
      const rect = canvas.getBoundingClientRect();

      if (evento.touches && evento.touches.length > 0) {
        return {
          x: evento.touches[0].clientX - rect.left,
          y: evento.touches[0].clientY - rect.top
        };
      }

      return {
        x: evento.clientX - rect.left,
        y: evento.clientY - rect.top
      };
    }

    function inizia(evento) {
      evento.preventDefault();
      drawing = true;
      const p = posizione(evento);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
    }

    function disegna(evento) {
      if (!drawing) return;
      evento.preventDefault();

      const p = posizione(evento);
      ctx.lineWidth = 2.5;
      ctx.lineCap = "round";
      ctx.strokeStyle = "#111";
      ctx.lineTo(p.x, p.y);
      ctx.stroke();

      firmeDisegnate[canvasId] = true;
    }

    function finisci(evento) {
      if (evento) evento.preventDefault();
      drawing = false;
    }

    canvas.addEventListener("mousedown", inizia);
    canvas.addEventListener("mousemove", disegna);
    canvas.addEventListener("mouseup", finisci);
    canvas.addEventListener("mouseleave", finisci);

    canvas.addEventListener("touchstart", inizia, { passive: false });
    canvas.addEventListener("touchmove", disegna, { passive: false });
    canvas.addEventListener("touchend", finisci, { passive: false });
  }

  function ridimensionaCanvas(canvasId) {
    const canvas = document.getElementById(canvasId);
    const rect = canvas.getBoundingClientRect();

    if (rect.width === 0) return;

    canvas.width = rect.width;
    canvas.height = 180;

    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function pulisciFirma(canvasId) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    firmeDisegnate[canvasId] = false;
  }

  async function caricaFirmaSuStorage(canvasId, rapportinoId, tipoFirma) {
    if (!firmeDisegnate[canvasId]) return null;

    const canvas = document.getElementById(canvasId);

    const blob = await new Promise(resolve => {
      canvas.toBlob(resolve, "image/png");
    });

    const nomeFile = `${rapportinoId}/${tipoFirma}_${Date.now()}.png`;

    const { error: uploadError } = await supabaseClient
      .storage
      .from("firme")
      .upload(nomeFile, blob, {
        contentType: "image/png",
        upsert: true
      });

    if (uploadError) throw uploadError;

    const { data } = supabaseClient.storage.from("firme").getPublicUrl(nomeFile);
    return data.publicUrl;
  }

  async function salvaRapportino() {
    const btn = document.getElementById("btnSalva");
    btn.disabled = true;
    btn.textContent = "Salvataggio in corso...";

    const { data: userData } = await supabaseClient.auth.getUser();
    const user = userData.user;

    if (!user) {
      mostraMessaggio("appMsg", "Utente non autenticato", "danger");
      btn.disabled = false;
      btn.textContent = "Salva rapportino e archivia PDF";
      return;
    }

    const datiRapportino = raccogliDatiRapportino(user.id);

    const { data: nuovoRapportino, error } = await supabaseClient
      .from("rapportini")
      .insert([datiRapportino])
      .select()
      .single();

    if (error) {
      mostraMessaggio("appMsg", "Errore salvataggio: " + error.message, "danger");
      btn.disabled = false;
      btn.textContent = "Salva rapportino e archivia PDF";
      return;
    }

    if (oreInserite.length > 0) {
      const righeOre = oreInserite.map(o => ({
        rapportino_id: nuovoRapportino.id,
        tipo: o.tipo,
        ora_inizio: o.ora_inizio,
        ora_fine: o.ora_fine
      }));

      const { error: oreError } = await supabaseClient
        .from("rapportino_ore")
        .insert(righeOre);

      if (oreError) {
        mostraMessaggio("appMsg", "Rapportino salvato, ma errore ore: " + oreError.message, "danger");
        return;
      }
    }

    try {
      const firmeDaSalvare = [];

      const firmaTecnicoUrl = await caricaFirmaSuStorage("firma_tecnico", nuovoRapportino.id, "tecnico");
      if (firmaTecnicoUrl) {
        firmeDaSalvare.push({
          rapportino_id: nuovoRapportino.id,
          tipo: "tecnico",
          nome_firmatario: document.getElementById("nome_tecnico").value || null,
          file_url: firmaTecnicoUrl
        });
      }

      const firmaClienteUrl = await caricaFirmaSuStorage("firma_cliente", nuovoRapportino.id, "cliente");
      if (firmaClienteUrl) {
        firmeDaSalvare.push({
          rapportino_id: nuovoRapportino.id,
          tipo: "cliente",
          nome_firmatario: document.getElementById("nome_cliente_firma").value || null,
          file_url: firmaClienteUrl
        });
      }

      if (firmeDaSalvare.length > 0) {
        const { error: firmeError } = await supabaseClient
          .from("firme")
          .insert(firmeDaSalvare);

        if (firmeError) {
          mostraMessaggio("appMsg", "Rapportino salvato, ma errore firme: " + firmeError.message, "danger");
          return;
        }
      }
    } catch (err) {
      mostraMessaggio("appMsg", "Rapportino salvato, ma errore upload firme: " + err.message, "danger");
      return;
    }

    try {
      const pdfBlob = await generaPdfBlob(nuovoRapportino.id, datiRapportino);
      const pdfPath = creaPercorsoPdf(nuovoRapportino.id, datiRapportino);

      const { error: uploadPdfError } = await supabaseClient
        .storage
        .from("pdf")
        .upload(pdfPath, pdfBlob, {
          contentType: "application/pdf",
          upsert: true
        });

      if (uploadPdfError) {
        mostraMessaggio("appMsg", "Rapportino salvato, ma errore upload PDF: " + uploadPdfError.message, "danger");
        return;
      }

      const { error: updatePdfError } = await supabaseClient
        .from("rapportini")
        .update({
          pdf_path: pdfPath,
          pdf_generato_at: new Date().toISOString(),
          versione_pdf: 1
        })
        .eq("id", nuovoRapportino.id);

      if (updatePdfError) {
        mostraMessaggio("appMsg", "PDF caricato, ma errore aggiornamento rapportino: " + updatePdfError.message, "danger");
        return;
      }

      mostraMessaggio("appMsg", "Rapportino salvato e PDF archiviato correttamente.", "success");
      btn.textContent = "Salvato correttamente";

      setTimeout(() => {
        window.location.reload();
      }, 1500);

    } catch (err) {
      mostraMessaggio("appMsg", "Rapportino salvato, ma errore generazione PDF: " + err.message, "danger");
      return;
    }
  }

  function raccogliDatiRapportino(userId) {
    return {
      data_intervento: document.getElementById("data_intervento").value,
      numero_so: document.getElementById("numero_so").value || null,
      committente_id: document.getElementById("committente_id").value || null,
      descrizione_cliente: document.getElementById("descrizione_cliente").value,
      indirizzo_cliente: document.getElementById("indirizzo_cliente").value,
      relazione: document.getElementById("relazione").value,
      materiali_note: document.getElementById("materiali_note").value,
      km_percorsi: document.getElementById("km_percorsi").value || null,
      tipo_addebito: document.getElementById("tipo_addebito").value || null,
      tecnico_id: userId,
      created_by: userId,
      updated_by: userId,
      stato: "chiuso"
    };
  }

  async function caricaLogo() {
    try {
      const response = await fetch("logo.jpg");
      if (!response.ok) return null;

      const blob = await response.blob();

      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });
    } catch (err) {
      return null;
    }
  }

  function testoDataOra(valore) {
    const d = new Date(valore);
    return `${d.toLocaleDateString("it-IT")} ${d.toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" })}`;
  }

  function gruppoOre(tipo) {
    return oreInserite.filter(o => o.tipo === tipo);
  }

  async function generaPdfBlob(rapportinoId, dati) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF("p", "mm", "a4");
    const logoBase64 = await caricaLogo();

    const committente = document.getElementById("committente_search").value || "-";
    const cliente = dati.descrizione_cliente || "-";
    const indirizzoCliente = dati.indirizzo_cliente || "-";
    const tecnico = document.getElementById("nome_tecnico").value || "-";
    const clienteFirma = document.getElementById("nome_cliente_firma").value || "-";

    function intestazione() {
      if (logoBase64) {
        doc.addImage(logoBase64, "JPEG", 12, 12, 28, 28);
      }

      doc.setFont("helvetica", "bold");
      doc.setFontSize(18);
      doc.text("BIEMME ENGINEERING SRL", 52, 17);

      doc.setFont("helvetica", "normal");
      doc.setFontSize(8);
      doc.text("VIA MONTELLO 43", 52, 25);
      doc.text("20831", 52, 31);
      doc.text("Monza", 76, 31);
      doc.text("MB", 124, 31);
      doc.text("Italia", 52, 37);
      doc.text("PI 02323360962", 52, 43);

      doc.text("Tel.", 145, 25);
      doc.text("0362-244145", 162, 25);
      doc.text("Fax", 145, 31);
      doc.text("0362-240467", 162, 31);
      doc.text("info@biemmeengineering.it", 145, 37);
      doc.text("www.biemmeengineering.it", 145, 43);
    }

    intestazione();

    let y = 50;

    doc.setLineWidth(0.3);
    doc.rect(12, y, 186, 7);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(8);
    doc.text("RAPPORTO ASSISTENZA TECNICA", 14, y + 5);

    doc.setFont("helvetica", "normal");
    doc.text("Data", 86, y + 5);
    doc.text(formattaDataSolo(dati.data_intervento), 98, y + 5);
    doc.text("Intervento n.", 132, y + 5);
    doc.text(dati.numero_so || rapportinoId.substring(0, 8), 156, y + 5);

    y += 10;

    doc.rect(12, y, 186, 13);
    doc.text("Numero SO", 18, y + 8);
    doc.text(dati.numero_so || "-", 55, y + 8);

    y += 16;

    doc.rect(12, y, 93, 28);
    doc.rect(105, y, 93, 28);

    doc.setFont("helvetica", "bold");
    doc.text("Cliente", 17, y + 6);
    doc.text("Committente", 110, y + 6);

    doc.setFont("helvetica", "normal");
    doc.text(cliente, 17, y + 14);
    doc.text(indirizzoCliente, 17, y + 21);
    doc.text(committente, 110, y + 14);

    y += 31;

    doc.rect(12, y, 186, 7);
    doc.setFont("helvetica", "bold");
    doc.text("INTERVENTO EFFETTUATO DA:", 14, y + 5);
    doc.setFont("helvetica", "normal");
    doc.text(tecnico.toUpperCase(), 68, y + 5);

    y += 7;

    doc.rect(12, y, 186, 7);
    doc.setFont("helvetica", "bold");
    doc.text("TIPOLOGIA ORE", 93, y + 5, { align: "center" });

    y += 7;

    doc.rect(12, y, 186, 7);
    doc.text("da", 46, y + 5);
    doc.text("a", 88, y + 5);
    doc.text("da", 130, y + 5);
    doc.text("a", 172, y + 5);

    y += 7;

    function rigaOrePdf(label, lista) {
      doc.rect(12, y, 186, 7);
      doc.setFont("helvetica", "normal");
      doc.text(label, 14, y + 5);

      if (lista[0]) {
        doc.text(testoDataOra(lista[0].ora_inizio), 46, y + 5);
        doc.text(testoDataOra(lista[0].ora_fine), 88, y + 5);
      }

      if (lista[1]) {
        doc.text(testoDataOra(lista[1].ora_inizio), 130, y + 5);
        doc.text(testoDataOra(lista[1].ora_fine), 172, y + 5);
      }

      y += 7;
    }

    rigaOrePdf("Ore trasferta", gruppoOre("trasferta"));
    rigaOrePdf("Ore lavorate", gruppoOre("lavoro"));

    y += 16;

    doc.setFont("helvetica", "bold");
    doc.setFontSize(16);
    doc.text("RELAZIONE", 105, y, { align: "center" });

    y += 8;

    doc.rect(12, y, 186, 95);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(9);

    const relazione = doc.splitTextToSize(dati.relazione || "-", 180);
    doc.text(relazione, 14, y + 6);

    doc.addPage();
    intestazione();

    y = 55;

    doc.setFontSize(8);
    doc.setFont("helvetica", "bold");

    const colW = 46.5;
    const startX = 12;

    doc.rect(startX, y, 186, 28);
    doc.line(startX + colW, y, startX + colW, y + 28);
    doc.line(startX + colW * 2, y, startX + colW * 2, y + 28);
    doc.line(startX + colW * 3, y, startX + colW * 3, y + 28);
    doc.line(startX, y + 9, startX + 186, y + 9);
    doc.line(startX, y + 18, startX + 186, y + 18);

    doc.text("Km percorsi", startX + colW / 2, y + 6, { align: "center" });
    doc.text("Materiale extra", startX + colW * 1.5, y + 6, { align: "center" });
    doc.text("Spese viaggio", startX + colW * 2.5, y + 6, { align: "center" });
    doc.text("Parcheggio", startX + colW * 3.5, y + 6, { align: "center" });

    doc.setFont("helvetica", "normal");
    doc.text(String(dati.km_percorsi || ""), startX + colW / 2, y + 15, { align: "center" });

    doc.setFont("helvetica", "bold");
    doc.text("Pranzi", startX + colW / 2, y + 24, { align: "center" });
    doc.text("Cene", startX + colW * 1.5, y + 24, { align: "center" });
    doc.text("Pernottamento", startX + colW * 2.5, y + 24, { align: "center" });
    doc.text("Varie", startX + colW * 3.5, y + 24, { align: "center" });

    y += 34;

    doc.rect(12, y, 186, 35);
    doc.setFont("helvetica", "bold");
    doc.text("Materiali", 105, y + 6, { align: "center" });
    doc.line(12, y + 9, 198, y + 9);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(8);
    const materiali = doc.splitTextToSize(dati.materiali_note || "-", 180);
    doc.text(materiali, 14, y + 15);

    y += 35;

    doc.rect(12, y, 60, 34);
    doc.rect(72, y, 63, 34);
    doc.rect(135, y, 63, 34);

    const checkX = 16;
    let checkY = y + 8;

    function checkbox(label, value) {
      doc.rect(checkX, checkY - 3, 4, 4);
      if (dati.tipo_addebito === value) {
        doc.line(checkX, checkY - 3, checkX + 4, checkY + 1);
        doc.line(checkX + 4, checkY - 3, checkX, checkY + 1);
      }
      doc.text(label, checkX + 7, checkY);
      checkY += 9;
    }

    doc.setFontSize(8);
    checkbox("In conto cliente", "cliente");
    checkbox("Garanzia", "garanzia");
    checkbox("In conto committente", "committente");

    doc.setFont("helvetica", "bold");
    doc.text("Firma Tecnico", 103, y + 7, { align: "center" });
    doc.text("Visto per accettazione cliente", 166, y + 7, { align: "center" });

    if (firmeDisegnate.firma_tecnico) {
      const imgTec = document.getElementById("firma_tecnico").toDataURL("image/png");
      doc.addImage(imgTec, "PNG", 78, y + 10, 48, 16);
    }

    if (firmeDisegnate.firma_cliente) {
      const imgCli = document.getElementById("firma_cliente").toDataURL("image/png");
      doc.addImage(imgCli, "PNG", 143, y + 10, 48, 16);
    }

    doc.setFont("helvetica", "normal");
    doc.text(tecnico, 103, y + 30, { align: "center" });
    doc.text(clienteFirma, 166, y + 30, { align: "center" });

    y += 45;

    doc.setFontSize(8);
    doc.text("Autore dello Step:", 16, y);
    doc.text(tecnico, 58, y);
    doc.text(new Date().toLocaleDateString("it-IT"), 150, y);
    doc.text(new Date().toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" }), 170, y);

    return doc.output("blob");
  }

  function creaPercorsoPdf(rapportinoId, dati) {
    const data = dati.data_intervento || new Date().toISOString().split("T")[0];
    const anno = data.substring(0, 4);
    const mese = data.substring(5, 7);

    const committente = pulisciNomeFile(document.getElementById("committente_search").value || "committente");
    const cliente = pulisciNomeFile(dati.descrizione_cliente || "cliente");
    const so = pulisciNomeFile(dati.numero_so || "senza-so");

    return `${anno}/${mese}/RPT_${data}_${committente}_${cliente}_${so}_${rapportinoId.substring(0, 8)}.pdf`;
  }

  function pulisciNomeFile(testo) {
    return testo
      .toString()
      .trim()
      .replace(/[àá]/gi, "a")
      .replace(/[èé]/gi, "e")
      .replace(/[ìí]/gi, "i")
      .replace(/[òó]/gi, "o")
      .replace(/[ùú]/gi, "u")
      .replace(/[^a-z0-9]+/gi, "-")
      .replace(/^-+|-+$/g, "")
      .substring(0, 40);
  }

  function formattaDataSolo(data) {
    if (!data) return "-";
    const d = new Date(data);
    return d.toLocaleDateString("it-IT");
  }

  function testoAddebito(value) {
    if (value === "cliente") return "In conto cliente";
    if (value === "committente") return "In conto committente";
    if (value === "garanzia") return "Garanzia";
    return "-";
  }

  function mostraMessaggio(id, testo, tipo) {
    const box = document.getElementById(id);
    box.textContent = testo;
    box.className = "msg " + tipo;
    box.classList.remove("hidden");
  }
</script>
